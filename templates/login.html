{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<img src="{{ url_for('static', filename='img/hero.png') }}" alt="People discussing online, surrounded by speech bubbles" class="hero-banner">
<div class="auth-card">
<h3>User Login</h3>
<form method="POST">
    <div class="field"><label>Username</label><input name="username" required></div>
    <div class="field"><label>Password</label><input type="password" name="password" required></div>
    <button class="btn btn-primary btn-block" type="submit">Login</button>
</form>
<p class="mt-3 mb-0">No account? <a href="{{ url_for('register') }}">Register here</a></p>
</div>
{% endblock %}
