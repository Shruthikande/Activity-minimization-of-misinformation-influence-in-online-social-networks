{% extends "base.html" %}
{% block title %}New Post{% endblock %}
{% block content %}
<h3>Create a Post</h3>
<form method="POST" enctype="multipart/form-data" style="max-width: 500px;">
    <div class="field"><label>Title</label><input name="title" required></div>
    <div class="field"><label>Description</label><textarea name="description" rows="4" required></textarea></div>
    <div class="field"><label>Category</label><input name="category"></div>
    <div class="field"><label>Image (optional)</label><input type="file" name="image" accept="image/png, image/jpeg, image/gif, image/webp"></div>
    <button class="btn btn-primary" type="submit">Post</button>
</form>
<p class="text-muted mt-3">Note: posts are automatically scanned against the admin's filter word list before being published.</p>
{% endblock %}
