{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h3>Welcome, {{ user }}!</h3>
<div class="row mt-4">
    <div class="col-4">
        <div class="card"><h5>Your Posts</h5><h2>{{ post_count }}</h2></div>
    </div>
    <div class="col-4">
        <div class="card"><h5>Your Friends</h5><h2>{{ friend_count }}</h2></div>
    </div>
</div>
{% endblock %}
