{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<img src="{{ url_for('static', filename='img/hero.png') }}" alt="People discussing online, surrounded by speech bubbles" class="hero-banner">
<div class="auth-card">
<h3>Register</h3>
<form method="POST">
    <div class="field"><label>Username</label><input name="username" required></div>
    <div class="field"><label>Password</label><input type="password" name="password" required></div>
    <div class="field"><label>Email</label><input type="email" name="email"></div>
    <div class="field"><label>Mobile</label><input name="mobile"></div>
    <button class="btn btn-primary btn-block" type="submit">Register</button>
</form>
<p class="mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
