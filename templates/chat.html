{% extends "base.html" %}
{% block title %}Chat with {{ friend }}{% endblock %}
{% block content %}
<h3>Chat with {{ friend }}</h3>
<div class="chat-box">
    {% for m in messages %}
        <p><strong>{{ m.sender }}:</strong> {{ m.message }}</p>
    {% else %}
        <p class="text-muted">No messages yet. Say hi!</p>
    {% endfor %}
</div>
<form method="POST" class="form-inline">
    <input name="message" placeholder="Type a message..." required>
    <button class="btn btn-primary" type="submit">Send</button>
</form>
{% endblock %}
