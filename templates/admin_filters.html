{% extends "base.html" %}
{% block title %}Filter Words{% endblock %}
{% block content %}
<h3>Misinformation Filter Words</h3>
<form method="POST" class="row mb-4">
    <div class="col-4"><input name="word" placeholder="Word to flag" required></div>
    <div class="col-4"><input name="category" placeholder="Category" value="Misinformation"></div>
    <div class="col-3"><button class="btn btn-primary btn-block" type="submit">Add</button></div>
</form>
<table>
<thead><tr><th>Word</th><th>Category</th><th></th></tr></thead>
<tbody>
{% for w in words %}
<tr>
    <td>{{ w.word }}</td>
    <td>{{ w.category }}</td>
    <td><a href="{{ url_for('delete_filter_word', word_id=w.id) }}" class="btn btn-sm btn-danger">Delete</a></td>
</tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
